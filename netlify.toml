# Netlify build configuration for Kalle's Sudoku frontend

[build]
  base    = "frontend"
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA redirect — all routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
