# render.yaml — One-click Render deployment for Kalle's Sudoku backend
# Deploy at: https://dashboard.render.com/select-repo
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: kalles-sudoku-api
    env: ruby
    rootDir: backend
    plan: free
    buildCommand: bundle install
    startCommand: bundle exec puma -p $PORT
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: RACK_ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false   # Set this manually in Render dashboard to your Netlify URL
      - key: DATABASE_URL
        fromDatabase:
          name: kalles-sudoku-db
          property: connectionString

databases:
  - name: kalles-sudoku-db
    plan: free
    databaseName: sudoku_prod
    user: sudoku_admin
